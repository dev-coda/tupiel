version: 1.0
runtime: docker
build:
  commands:
    build:
      - echo "Building backend..."
      - cd backend
      - npm install
      - npm run build
run:
  runtime-version: 18
  command: cd backend && npm start
  network:
    port: 3000
    env: PORT
  env:
    - name: NODE_ENV
      value: production
