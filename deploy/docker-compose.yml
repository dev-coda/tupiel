services:
  # ─── MySQL (App Database - read/write) ───
  mysql:
    image: mysql:8.0
    container_name: tupiel-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${APP_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: tupiel_app
      MYSQL_USER: tupiel_app
      MYSQL_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306" # 3307 on host to avoid conflict with local MySQL on 3306
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${APP_DB_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tupiel-net

  # ─── Backend (Node.js Express API) ───
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: tupiel-backend:latest
    container_name: tupiel-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Production database (DigitalOcean - read-only for reports)
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      USE_LOCAL_DB: "false"
      # App database (local MySQL container - read/write)
      APP_DB_HOST: mysql
      APP_DB_PORT: "3306"
      APP_DB_NAME: tupiel_app
      APP_DB_USER: tupiel_app
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - tupiel-net

  # ─── Frontend (Angular + Nginx) ───
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: tupiel-frontend:latest
    container_name: tupiel-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: /api
    expose:
      - "80"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - tupiel-net

  # ─── Nginx Reverse Proxy (SSL termination + routing) ───
  nginx-proxy:
    image: nginx:alpine
    container_name: tupiel-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - tupiel-net

volumes:
  mysql_data:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local

networks:
  tupiel-net:
    driver: bridge
