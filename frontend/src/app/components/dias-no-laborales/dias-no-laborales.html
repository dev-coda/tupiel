<div class="dias-no-laborales-container">
  <p-card>
    <ng-template #header>
      <div class="card-header">
        <i class="pi pi-calendar-times"></i>
        <span>Días No Laborales</span>
      </div>
    </ng-template>

    @if (error()) {
      <p-message severity="error" [text]="error()!" styleClass="mb-3" />
    }

    <div class="toolbar">
      <p-button
        icon="pi pi-plus"
        label="Agregar Día"
        (onClick)="openNewDialog()"
        severity="primary"
      />
      <p-button
        icon="pi pi-calendar"
        label="Agregar Domingos"
        (onClick)="addAllSundays()"
        severity="secondary"
        [outlined]="true"
        [loading]="loading()"
      />
    </div>

    @if (loading() && dias().length === 0) {
      <div class="loading-container">
        <p-progressSpinner />
        <p>Cargando días no laborales...</p>
      </div>
    } @else {
      <p-table
        [value]="dias()"
        [loading]="loading()"
        styleClass="p-datatable-sm p-datatable-striped"
        [paginator]="true"
        [rows]="20"
        [rowsPerPageOptions]="[10, 20, 50]"
      >
        <ng-template #header>
          <tr>
            <th style="width: 200px">Fecha</th>
            <th>Descripción</th>
            <th style="width: 150px">Acciones</th>
          </tr>
        </ng-template>
        <ng-template #body let-dia>
          <tr>
            <td>
              <strong>{{ formatDateDisplay(dia.fecha) }}</strong>
            </td>
            <td>{{ dia.descripcion || '-' }}</td>
            <td>
              <div class="action-buttons">
                <p-button
                  icon="pi pi-pencil"
                  [rounded]="true"
                  [text]="true"
                  severity="info"
                  (onClick)="openEditDialog(dia)"
                  pTooltip="Editar"
                />
                <p-button
                  icon="pi pi-trash"
                  [rounded]="true"
                  [text]="true"
                  severity="danger"
                  (onClick)="deleteDia(dia)"
                  pTooltip="Eliminar"
                />
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template #emptymessage>
          <tr>
            <td colspan="3" class="text-center">
              <p>No hay días no laborales registrados</p>
            </td>
          </tr>
        </ng-template>
      </p-table>
    }
  </p-card>

  <!-- Dialog for Add/Edit -->
  <p-dialog
    [(visible)]="showDialog()"
    [header]="editingDia() ? 'Editar Día No Laboral' : 'Agregar Día No Laboral'"
    [modal]="true"
    [style]="{ width: '500px' }"
    (onHide)="closeDialog()"
  >
    <div class="dialog-content">
      <div class="form-group">
        <label for="fecha">Fecha <span class="required">*</span></label>
        <p-datepicker
          id="fecha"
          [(ngModel)]="fecha"
          dateFormat="yy-mm-dd"
          [showIcon]="true"
          [style]="{ width: '100%' }"
          placeholder="Seleccione una fecha"
        />
      </div>

      <div class="form-group">
        <label for="descripcion">Descripción (opcional)</label>
        <input
          id="descripcion"
          type="text"
          pInputText
          [(ngModel)]="descripcion"
          placeholder="Ej: Día festivo, Vacaciones, etc."
          [style]="{ width: '100%' }"
        />
      </div>
    </div>

    <ng-template #footer>
      <div class="dialog-footer">
        <p-button
          label="Cancelar"
          icon="pi pi-times"
          (onClick)="closeDialog()"
          [outlined]="true"
          severity="secondary"
        />
        <p-button
          [label]="editingDia() ? 'Actualizar' : 'Guardar'"
          icon="pi pi-check"
          (onClick)="saveDia()"
          severity="primary"
        />
      </div>
    </ng-template>
  </p-dialog>

  <p-confirmDialog />
  <p-toast />
</div>
