<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <i class="pi pi-heart-fill login-icon"></i>
      <h1>TuPiel</h1>
      <p>Controlador PPTO</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      @if (error()) {
        <p-message severity="error" [text]="error()!" styleClass="login-error" />
      }

      <div class="field">
        <label for="username">Usuario</label>
        <input
          pInputText
          id="username"
          [(ngModel)]="username"
          name="username"
          placeholder="Ingrese su usuario"
          autocomplete="username"
          [style]="{ width: '100%' }"
        />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <p-password
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Ingrese su contraseña"
          [toggleMask]="true"
          [feedback]="false"
          autocomplete="current-password"
          styleClass="login-password"
          [style]="{ width: '100%' }"
          (keydown.enter)="onSubmit()"
        />
      </div>

      <p-button
        label="Iniciar Sesión"
        icon="pi pi-sign-in"
        [loading]="loading()"
        (onClick)="onSubmit()"
        styleClass="login-button"
        [style]="{ width: '100%' }"
      />
    </form>
  </div>
</div>
